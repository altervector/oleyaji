/*//////////////////////   BLOC 3 IMATGES (Index)    ////////////////////////////////////////////*/

    .bloc-imatges {    /*   Contenidor   */
        max-width: device-width;
        width: 90%;
        margin: 50px auto;
       height: 600px; 
       display: flex; 
        gap: 8px; 
        align-items: stretch; /* <--- Afegeix això      Iguala derta i esquerra*/
        outline: 1px solid red !important;
    /* background-color: #f5f5f5; */
    }

/*______________________COLUMNA ESQUERRA (Contenidor de les 2 petites)_____ */
                .columna-esquerra {
                    display: flex; 
                    flex-direction: column; 
                    /*justify-content: space-between;*/
                    width: 42%;
                    gap: 8px; 
                    height: 100%; /* Assegura que la columna ocupa tot el pare */
                    outline: 1px solid blue !important;
                }                                                                                               

/*____________________ IMATGE GRAN A LA DRETA _______Contenidor...____*/
                .imatge-dreta {
                    display: flex; 
                    width: 58%;
                    height: 100%; 
                    margin: 0px 0px;
                    outline: 0px solid red !important;
                }

/*______________________Bloc inferior (Postres i  Mapa)_________Contenidor...____________ */
                .bloc-imatge-inferior {
                    max-width: device-width;;
                    width: 90%;
                    margin: 10px auto; /* Donem espai (10px) perquè no s'enganxi a dalt */
                    display: block;
                    outline: 0px solid brown !important;
                }

                /* Forcem que la caixa de Postres sigui igual que el conjunt de dalt */
                .item-horizontal {
                    height: 296px !important; 
                    margin-bottom:10px;
                }




/*???????????????????????????????????????????????????*/
                .item-horizontal img {
                    width: 100%;
                    height: 100%;
                    object-fit: cover;
                    display: block;
                }
/*????????????????????????????????????????????????????????*/








/*/////////////////////////   ESTIL DE LES IMATGES   (Index)   ///////////////////*/

.imatge-categoria {
    width: 100%;
    height: 100%; 
    object-fit: cover; 
    display: block;
    outline: 1px solid orangered !important;
}

/*___________________________________ Asegurem que els enllaços siguin el contenidor dels textos _______*/
.enllac-imatge-categoria {
    position: relative; /* Això és l'àncora pels textos */
    display: block;
    width: 100%;
    box-shadow: -1px 2px 8px rgba(0, 0, 0, 0.8);
    /*background-color: #f5f5f5;*/
    padding: 0px;
    box-sizing: border-box; /* Molt important per les mides! */
}

/*___________________________________________ EFECTE VISUAL AL HOVER________________________________ */
.enllac-imatge-categoria:hover img {
    opacity: 0.85; 
    transition: opacity 0.2s ease-in-out;
}
                /* 2. Apliquem els 97px NOMÉS a les fotos de la columna esquerra */
            .columna-esquerra .enllac-imatge-categoria {
                height: 296px;
            }

            /* 3. Apliquem el 100% NOMÉS a la foto de la dreta */
            .imatge-dreta .enllac-imatge-categoria {
                height: 100%;
            }

/* ________________________________ Els textos flotants (Lletres blanques amb ombra, sense marc)_____________ */
.etiqueta-categoria {
    position: absolute;
    bottom: 8px;
    left: 8px;
    color: rgb(182, 67, 67);
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
    text-shadow: 1px 1px 3px rgba(255,255,0,1); /* Ombra perquè es llegeixi bé */
    pointer-events: none;
    z-index: 10;
}
</style>
