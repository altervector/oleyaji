<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>404</title>

    <style>
        body { 
            opacity: 1; 
            transition: opacity 0.5s ease-in; 
            margin: 0;
            background-color: #ffffff; /* Pantalla completa sempre negra */
        }

        .bg {
            max-width: 100vw;
            width: 120%;
            background-image: url('images/404.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 160%;
            min-height: 100vh;
            margin: 0 auto; /* Centra el bloc al PC */
        }

        @media (min-width: 1024px) {
            .bg {
                max-width: 1024px;
                background-size: auto;
            }
            
        }
    </style>


</head>

<body>

<div class="bg"></div>

</body>

</html>
