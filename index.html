<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=400px, initial-scale=1.0"> 

    <script>
    const sitiosSeguros = [
        "altervector.com", 
        "netlify.app", 
        "localhost", 
        "127.0.0.1"
        ];

        const esSitioSeguro = sitiosSeguros.some(sitio => window.location.hostname.includes(sitio));

            if (!esSitioSeguro) {
                // Bloqueo total si el dominio es sospechoso
                document.documentElement.innerHTML = ""; 
                window.location.href = "https://oleyaji.altervector.com";
            }
    </script>
    
    <script>
    (function() {
        var cssLink = document.createElement("link");
        cssLink.rel = "stylesheet";
        // Añade el tiempo exacto en milisegundos para que la URL siempre sea "nueva" para el navegador
        cssLink.href = "https://cdn.jsdelivr.net/gh/altervector/oleyajidinamics@test/estils.css?v=" + new Date().getTime();
        /*///////////////////////////////////altervector.github.io/oleyajidinamics/estils.css///////////////////////////////////////*/
        document.head.appendChild(cssLink);
        // Comprobar si el modo edición está activo para poner el fondo amarillo de inmediato
        if (sessionStorage.getItem('adminMode') === 'true') {
        document.documentElement.style.setProperty('background-color', 'var(--bg-htmledit)', 'important');
        }
    })();
    </script>

        <style>
        /* El velo: ocultamos todo el cuerpo de la web */
        body { opacity: 0; }
        </style>
    
 
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            document.body.style.display = 'block';
        });
    </script>
    
</head>
<body>
    hola
    <div id="capcalera-dinamica"></div>

    
            <div id="contingut-index"></div>

            <hr class="separador-hr">
            <hr class="separador-hr">

    <div id="bloc-enllacos-dinamic"></div>



    <script src="https://cdn.jsdelivr.net/gh/altervector/oleyajidinamics@test/capcalera.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/altervector/oleyajidinamics@test/enllacos.js"></script>
    
    <script>
    (function() {
        var s = document.createElement("script");
        s.src = "https://cdn.jsdelivr.net/gh/altervector/oleyajidinamics@test/indexlogic.js?v=" + new Date().getTime();
        s.defer = true;
        document.head.appendChild(s);
    })();
    </script>

</body>
</html>
