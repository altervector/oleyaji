<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olé y Ají - Principal</title>

    <style>
        body { opacity: 0; transition: opacity 0.5s ease-in; }
    </style>

    <script>
        (function() {
            const now = new Date().getTime();
            const rutaConfig = "https://altervector.github.io/oleyajidinamics/config.js";
            document.write('<script src="' + rutaConfig + '?v=' + now + '"><\/script>');
        })();
    </script>

    <script>
        (function() {
            if (typeof CONFIG === 'undefined') return;

            const now = new Date().getTime();
            const repoBase = CONFIG.BASE_URL;

            // 1. CARGA DE ESTILOS
            const css = document.createElement("link");
            css.rel = "stylesheet";
            css.href = repoBase + "estils.css?v=" + now;
            document.head.appendChild(css);

            // 2. CARGA DEL FAVICON (Ara sí, amb la ruta bona)
            const icon = document.createElement("link");
            icon.rel = "icon";
            icon.href = repoBase + "Icon/logonou.ico";
            document.head.appendChild(icon);

            // 3. CARGA DE LOGICA (Afegim l'API i el teu logic del Principal)
            const scripts = ["api.js", "capcalera.js", "enllacos.js", "principallogic.js"];
            scripts.forEach(file => {
                const s = document.createElement("script");
                s.src = repoBase + file + "?v=" + now;
                s.async = false;
                document.head.appendChild(s);
            });

            // 4. QUITAR VELO
            window.addEventListener('load', () => {
                document.body.style.opacity = "1";
            });
        })();
    </script>
</head>
<body>

    <div id="capcalera-dinamica"></div>
    
    <div class="galeria-productes">
        <h1 id="titol-categoria">Carregant...</h1>
        <div id="cosgaleria"></div>
    </div>
    
    <hr class="separador-hr">
    <hr class="separador-hr">

    <div id="bloc-enllacos-dinamic"></div>

</body>
</html>
